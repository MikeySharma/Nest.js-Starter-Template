services:
  postgres:
    image: postgres:16
    container_name: postgresprisma
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - .env
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: topsecret
      POSTGRES_DB: unlocked
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prisma -d unlocked']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres:
    name: nest-prisma-db
